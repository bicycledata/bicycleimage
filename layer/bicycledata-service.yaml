# METABEGIN
# X-Env-Layer-Name: bicycledata-service
# X-Env-Layer-Category: general
# X-Env-VarPrefix: bicycledata
# METAEND
---
mmdebstrap:
  customize-hooks:
    - |
      export BICYCLEDATA_USER="$IGconf_device_user1"
      export BICYCLEDATA_RUNDIR="/home/$IGconf_device_user1"
      envsubst < bicycledata.service.tpl > $1/etc/systemd/system/bicycledata.service
    - $BDEBSTRAP_HOOKS/enable-units "$1" bicycledata
