# METABEGIN
# X-Env-Layer-Name: bicycledata-locale
# X-Env-Layer-Category: general
# METAEND
---
mmdebstrap:
  customize-hooks:
    - |
      if [ -f "$1/etc/locale.gen" ]; then
        sed -i 's/^# *\(sv_SE.UTF-8\) UTF-8/\1 UTF-8/' "$1/etc/locale.gen"
        if ! grep -Eq '^sv_SE.UTF-8 UTF-8$' "$1/etc/locale.gen"; then
          echo 'sv_SE.UTF-8 UTF-8' >> "$1/etc/locale.gen"
        fi
      fi

      cat > "$1/etc/default/locale" <<EOF
      LANG=sv_SE.UTF-8
      LC_ALL=sv_SE.UTF-8
      EOF

      if [ -x "$1/usr/sbin/locale-gen" ]; then
        chroot "$1" /usr/sbin/locale-gen sv_SE.UTF-8
      fi

      cat > "$1/etc/timezone" <<EOF
      Europe/Stockholm
      EOF

      if [ -e "$1/usr/share/zoneinfo/Europe/Stockholm" ]; then
        ln -sf /usr/share/zoneinfo/Europe/Stockholm "$1/etc/localtime"
      fi

      mkdir -p "$1/etc/wpa_supplicant"
      cat > "$1/etc/wpa_supplicant/wpa_supplicant.conf" <<EOF
      country=SE
      ctrl_interface=DIR=/var/run/wpa_supplicant GROUP=netdev
      update_config=1

      network={
        ssid="bicycledata"
        psk="bicycledata"
      }
      EOF

      if [ -f "$1/etc/default/crda" ]; then
        if grep -q '^REGDOMAIN=' "$1/etc/default/crda"; then
          sed -i 's/^REGDOMAIN=.*/REGDOMAIN=SE/' "$1/etc/default/crda"
        else
          echo 'REGDOMAIN=SE' >> "$1/etc/default/crda"
        fi
      fi
